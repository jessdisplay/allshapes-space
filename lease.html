const un=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function attempt(pw){
  const mat=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:un(SALT),iterations:ITER,hash:'SHA-256'},mat,{name:'AES-GCM',length:256},false,['decrypt']);
  const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:un(IV)},key,un(DATA));
  sessionStorage.setItem('allshapes-key',pw);
  if(KIND==='pdf'){
    const url=URL.createObjectURL(new Blob([plain],{type:'application/pdf'}));
    location.replace(url);
  }else{
    const html=new TextDecoder().decode(plain);
    document.open();document.write(html);document.close();
  }
}
document.getElementById('f').addEventListener('submit',async e=>{
  e.preventDefault();
  document.getElementById('busy').style.display='block';
  document.getElementById('err').style.display='none';
  try{await attempt(document.getElementById('pw').value)}
  catch(_){sessionStorage.removeItem('allshapes-key');
    document.getElementById('busy').style.display='none';
    document.getElementById('err').style.display='block';}
});
const saved=sessionStorage.getItem('allshapes-key');
if(saved){document.getElementById('busy').style.display='block';attempt(saved).catch(()=>{sessionStorage.removeItem('allshapes-key');document.getElementById('busy').style.display='none';});}
